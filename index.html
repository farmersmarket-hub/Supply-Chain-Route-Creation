<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Chain Route Creation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(to bottom right, #d1fae5, #a8e6cf, #e6d7b2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      width: 700px;
      height: 85vh;
      overflow-y: auto;
    }
    label { font-weight: bold; color: #333; }
    .toggle-switch { position: relative; width: 56px; height: 28px; display: inline-block; vertical-align: middle; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top:0;left:0;right:0;bottom:0; background-color: #10b981; border-radius: 28px; transition: 0.3s; }
    .toggle-slider::before { content:""; position:absolute; height:22px; width:22px; left:3px; bottom:3px; background-color:white; border-radius:50%; transition:0.3s; }
    .toggle-switch input:checked + .toggle-slider { background-color: #f59e0b; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(28px); }
    .vendor-card { background: rgba(255,255,255,0.5); border:1px solid #d1d5db; border-radius:12px; padding:16px; margin-bottom:12px; }
    .crop-card { background: rgba(236,253,245,0.6); border:1px solid #a7f3d0; border-radius:8px; padding:12px; margin-bottom:8px; }
    .drag-handle { cursor:grab; user-select:none; color:#9ca3af; font-size:18px; }
    .drag-handle:active { cursor:grabbing; }
    .vendor-card.dragging { opacity:0.5; border:2px dashed #10b981; }
  </style>
</head>
<body>
  <div class="glass p-6">
    <div class="text-center mb-4">
      <a href="https://farmersmarket-hub.github.io/Home/" target="_blank">
        <img src="Market_logo.png" alt="Market Logo" class="mx-auto" style="max-height: 100px;">
      </a>
    </div>
    <h2 class="text-2xl font-bold text-center mb-2 text-gray-900">Supply Chain Route Creation</h2>
    <p class="text-center italic text-sm text-gray-700 mb-6">Complete this form to create or amend a supply chain pickup route.</p>

    <form id="routeCreationForm" class="space-y-4" onsubmit="submitForm(event)">

      <!-- 1. Toggle switch - new creation or amendment -->
      <div>
        <label>Route Mode <span class="text-red-500">*</span></label>
        <div class="flex items-center gap-3 mt-1">
          <span class="text-sm font-semibold text-emerald-700">New Creation</span>
          <label class="toggle-switch"><input type="checkbox" id="modeToggle" onchange="toggleMode()"><span class="toggle-slider"></span></label>
          <span class="text-sm font-semibold text-amber-600">Amendment</span>
        </div>
        <p class="text-xs text-gray-500 mt-1" id="modeLabel">Creating a new route</p>
      </div>

      <!-- Amendment: Route ID lookup (hidden by default) -->
      <div id="amendmentSection" class="hidden">
        <label>Route ID to Amend <span class="text-red-500">*</span></label>
        <div class="flex gap-2">
          <input type="text" id="amendRouteId" class="flex-1 p-2 border rounded bg-white" placeholder="Enter existing Route ID">
          <button type="button" onclick="retrieveRoute()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded font-semibold text-sm">Retrieve</button>
        </div>
      </div>

      <!-- 2. Business registry visibility -->
      <div>
        <label>Do you want your business/organization to be visible within the regional vendor business registry within this app?</label>
        <select id="businessVisible" name="businessVisible" class="w-full p-2 border rounded bg-white">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <!-- 3. Manager visibility -->
      <div>
        <label>Do you want your business/organization vendor status as a <span class="underline">manager</span> to be visible within the regional vendor business registry within this app?</label>
        <select id="managerVisible" name="managerVisible" class="w-full p-2 border rounded bg-white">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <!-- 4. Route Name (autogenerate Route ID) -->
      <div>
        <label>Route Name <span class="text-red-500">*</span>
          <span class="text-sm font-normal text-gray-500 block">(Route ID will be auto-generated)</span>
        </label>
        <input type="text" id="routeName" name="routeName" class="w-full p-2 border rounded bg-white" placeholder="e.g., Thursday NE Portland Route" required>
      </div>

      <div>
        <label>Route ID</label>
        <input type="text" id="routeId" name="routeId" class="w-full p-2 border rounded bg-white" readonly placeholder="Auto-generated">
      </div>

      <!-- 5. Date of pick-up (autopopulate) -->
      <div>
        <label>Date of Pick-up
          <span class="text-sm font-normal text-gray-500 block">(Auto-populated)</span>
        </label>
        <input type="date" id="pickupDate" name="pickupDate" class="w-full p-2 border rounded bg-white" readonly>
      </div>

      <!-- 6. (From start date to end date) Total number of route runs (autopopulate) -->
      <div>
        <label>Start Date <span class="text-red-500">*</span></label>
        <input type="date" id="startDate" name="startDate" class="w-full p-2 border rounded bg-white" required onchange="calculateRouteRuns()">
      </div>

      <div>
        <label>End Date <span class="text-red-500">*</span></label>
        <input type="date" id="endDate" name="endDate" class="w-full p-2 border rounded bg-white" required onchange="calculateRouteRuns()">
      </div>

      <div>
        <label>Total Number of Route Runs
          <span class="text-sm font-normal text-gray-500 block">(Auto-populated from start date to end date)</span>
        </label>
        <input type="number" id="totalRouteRuns" name="totalRouteRuns" class="w-full p-2 border rounded bg-white" readonly placeholder="Auto-calculated">
      </div>

      <!-- 7. Route creation or amendment date -->
      <div>
        <label>Route Creation or Amendment Date</label>
        <input type="date" id="creationDate" name="creationDate" class="w-full p-2 border rounded bg-white" readonly>
      </div>

      <hr class="border-gray-300">

      <!-- Vendors Section -->
      <div>
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-bold text-gray-800">Vendors on Route</h3>
          <button type="button" onclick="addVendorCard()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-sm px-4 py-1.5 rounded-full font-semibold">+ Add Vendor</button>
        </div>
        <p class="text-xs text-gray-500 mt-1">Drag <span class="drag-handle">⠿</span> to reorder vendor pickup sequence.</p>
      </div>

      <div id="vendorContainer"></div>

      <hr class="border-gray-300">

      <!-- Route Creation and Amendment section -->
      <h3 class="text-lg font-bold text-gray-800">Route Creation and Amendment</h3>

      <!-- Route Name (text field) -->
      <div>
        <label>Route Name (text field)</label>
        <input type="text" id="routeNameAmend" name="routeNameAmend" class="w-full p-2 border rounded bg-white" placeholder="Enter or update route name">
      </div>

      <!-- Order of vendors (AI generated?) -->
      <div>
        <label>Order of Vendors
          <span class="text-sm font-normal text-gray-500 block">(?)</span>
        </label>
        <textarea id="vendorOrder" name="vendorOrder" class="w-full p-2 border rounded bg-white" rows="3" readonly placeholder="Auto-generated vendor pickup order will appear here"></textarea>
      </div>

      <div class="text-center">
        <button type="submit" class="submit-btn bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-full mt-4">Submit Route</button>
      </div>
      <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4 mt-2" role="alert"></div>
    </form>
  </div>

  <script>
    let vendorCounter = 0, draggedCard = null;

    const produceCategories = {
      "Vegetables": ["African eggplants","Beans","Beets","Bell Pepper","Black Eyed Peas","Broccoli","Carrots","Cauliflower","Celery","Chilies","Cilantro","Collard Greens","Corn","Cucumbers","Garlic","Green Beans","Kale","Lettuce","Mchicha (African Spinach)","Nightshade","Onions","Peas","Potatoes","Pumpkin and Leaves","Radish","Sweet Potato Leaves","Swiss Chards","Tomatillo","Tomatoes","Zucchini","Other"],
      "Fruits": ["Blueberries","Strawberry","Other"],
      "Grains": ["African Maize","Other"],
      "Other": ["Other"]
    };

    // Init
    document.getElementById('creationDate').value = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    document.getElementById('pickupDate').value = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });

    function toggleMode() {
      const a = document.getElementById('modeToggle').checked;
      document.getElementById('amendmentSection').classList.toggle('hidden', !a);
      document.getElementById('modeLabel').textContent = a ? 'Amending an existing route' : 'Creating a new route';
    }

    function retrieveRoute() {
      const id = document.getElementById('amendRouteId').value.trim();
      if (!id) { alert('Please enter a Route ID.'); return; }
      document.getElementById('routeId').value = id;
      alert('Route retrieval will connect to your backend. Route ID set.');
    }

    function calculateRouteRuns() {
      const s = document.getElementById('startDate').value;
      const e = document.getElementById('endDate').value;
      if (!s || !e) return;
      const sd = new Date(s + 'T00:00:00'), ed = new Date(e + 'T00:00:00');
      if (ed <= sd) { document.getElementById('totalRouteRuns').value = 0; return; }
      const diffDays = Math.floor((ed - sd) / (1000 * 60 * 60 * 24));
      const weeks = Math.floor(diffDays / 7);
      document.getElementById('totalRouteRuns').value = weeks > 0 ? weeks : 1;
      if (!document.getElementById('modeToggle').checked && !document.getElementById('routeId').value) {
        document.getElementById('routeId').value = 'RT-' + Date.now().toString(36).toUpperCase();
      }
      recalcAllGrandTotals();
    }

    function addVendorCard() {
      vendorCounter++;
      const idx = vendorCounter;
      const container = document.getElementById('vendorContainer');
      const card = document.createElement('div');
      card.className = 'vendor-card';
      card.id = `vendor-card-${idx}`;
      card.draggable = true;
      card.dataset.vendorIdx = idx;

      card.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="drag-handle" title="Drag to reorder">⠿</span>
            <span class="font-bold text-gray-700">Stop #<span class="stop-number">${container.children.length + 1}</span></span>
          </div>
          <button type="button" onclick="removeVendorCard(${idx})" class="text-red-500 hover:text-red-700 font-bold text-lg">✕</button>
        </div>
        <div class="space-y-3">

          <!-- Vendor Name (autoretrieve Vendor ID and address) -->
          <div>
            <label class="text-sm">Vendor Name <span class="text-red-500">*</span>
              <span class="text-xs font-normal text-gray-500 block">(Auto-retrieves Vendor ID and address)</span>
            </label>
            <input type="text" id="vName-${idx}" class="w-full p-2 border rounded bg-white text-sm" placeholder="Enter Vendor Name" onchange="lookupVendor(${idx})">
          </div>

          <div>
            <label class="text-sm">Vendor ID</label>
            <input type="text" id="vId-${idx}" class="w-full p-2 border rounded bg-white text-sm" readonly>
          </div>

          <div>
            <label class="text-sm">Address
              <span class="text-xs font-normal text-gray-500 block">(Auto-retrieved — optional manual overwrite)</span>
            </label>
            <input type="text" id="vAddr-${idx}" class="w-full p-2 border rounded bg-white text-sm" placeholder="Auto-populated or manually enter">
          </div>

          <!-- Order # of pick-up -->
          <div>
            <label class="text-sm">Order # of Pick-up</label>
            <input type="number" id="vOrder-${idx}" class="w-full p-2 border rounded bg-white text-sm" readonly>
          </div>

          <!-- Crops Section -->
          <div class="flex items-center justify-between mt-2">
            <label class="text-sm mb-0">Crops assigned for pick up for each vendor</label>
            <button type="button" onclick="addCropRow(${idx})" class="bg-green-100 hover:bg-green-200 text-green-800 text-xs px-3 py-1 rounded-full font-semibold">+ Add Item</button>
          </div>
          <div id="cropContainer-${idx}"></div>

        </div>
      `;

      container.appendChild(card);
      updateStopNumbers();
      updateVendorOrder();
      initDragAndDrop();
      addCropRow(idx);
    }

    function removeVendorCard(idx) {
      const c = document.getElementById(`vendor-card-${idx}`);
      if (c) c.remove();
      updateStopNumbers();
      updateVendorOrder();
    }

    function lookupVendor(idx) {
      // Placeholder: will connect to backend to autoretrieve Vendor ID and address
      // For now fields are manually fillable
    }

    function addCropRow(vendorIdx) {
      const container = document.getElementById(`cropContainer-${vendorIdx}`);
      const num = container.children.length + 1;
      const row = document.createElement('div');
      row.className = 'crop-card';
      row.id = `crop-${vendorIdx}-${num}-${Date.now()}`;

      row.innerHTML = `
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-bold text-green-700">Item #${num}</span>
          <button type="button" onclick="this.closest('.crop-card').remove(); recalcAllGrandTotals();" class="text-red-400 hover:text-red-600 text-sm">✕</button>
        </div>
        <div class="space-y-2">

          <!-- Produce Category -->
          <div>
            <label class="text-xs font-semibold">Produce Category</label>
            <select class="w-full p-1.5 border rounded bg-white text-sm crop-category" onchange="populateItems(this)">
              <option value="">- Select Category -</option>
              ${Object.keys(produceCategories).map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
          </div>

          <!-- Produce Item -->
          <div>
            <label class="text-xs font-semibold">Produce Item</label>
            <select class="w-full p-1.5 border rounded bg-white text-sm crop-item">
              <option value="">- Select Item -</option>
            </select>
          </div>

          <!-- Optional text field -->
          <div>
            <label class="text-xs font-semibold">Specify / Description (optional)</label>
            <input type="text" class="w-full p-1.5 border rounded bg-white text-sm" placeholder="e.g., cherry tomatoes, organic">
          </div>

          <!-- Total quantity of each item (pounds and/or boxes) -->
          <div>
            <label class="text-xs font-semibold">Total Quantity of Each Item (lbs)</label>
            <input type="number" step="0.01" class="w-full p-1.5 border rounded bg-white text-sm crop-qty-lbs" placeholder="0">
          </div>

          <div>
            <label class="text-xs font-semibold">Total Quantity of Each Item (boxes)</label>
            <input type="number" step="1" class="w-full p-1.5 border rounded bg-white text-sm crop-qty-boxes" placeholder="0">
          </div>

          <!-- Expected total quantity per load per item -->
          <div>
            <label class="text-xs font-semibold">Expected Total Quantity per Load per Item</label>
            <input type="number" step="0.01" class="w-full p-1.5 border rounded bg-white text-sm crop-per-load" placeholder="0" oninput="recalcGrandTotal(this)">
          </div>

          <!-- Wholesale Unit Price -->
          <div>
            <label class="text-xs font-semibold">Wholesale Unit Price ($)
              <span class="text-xs font-normal text-gray-500 block">(Auto-populate from Upcoming Market form OR manual input here)</span>
            </label>
            <input type="number" step="0.01" class="w-full p-1.5 border rounded bg-white text-sm crop-unit-price" placeholder="0.00" oninput="recalcGrandTotal(this)">
          </div>

          <!-- Grand Total Price per Item (autopopulate) -->
          <div>
            <label class="text-xs font-semibold">Grand Total Price per Item
              <span class="text-xs font-normal text-gray-500 block">(Auto-populated: Unit Price × Qty per Load × Total Route Runs)</span>
            </label>
            <input type="text" class="w-full p-1.5 border rounded bg-white text-sm font-bold crop-grand-total" readonly value="$0.00">
          </div>

        </div>
      `;
      container.appendChild(row);
    }

    function populateItems(sel) {
      const cat = sel.value;
      const items = sel.closest('.crop-card').querySelector('.crop-item');
      items.innerHTML = '<option value="">- Select Item -</option>';
      if (produceCategories[cat]) produceCategories[cat].forEach(i => { const o = document.createElement('option'); o.value = i; o.textContent = i; items.appendChild(o); });
    }

    function recalcGrandTotal(el) {
      const card = el.closest('.crop-card');
      const pl = parseFloat(card.querySelector('.crop-per-load').value) || 0;
      const up = parseFloat(card.querySelector('.crop-unit-price').value) || 0;
      const tr = parseInt(document.getElementById('totalRouteRuns').value) || 0;
      card.querySelector('.crop-grand-total').value = `$${(up * pl * tr).toFixed(2)}`;
    }

    function recalcAllGrandTotals() {
      document.querySelectorAll('.crop-card').forEach(card => {
        const pl = parseFloat(card.querySelector('.crop-per-load')?.value) || 0;
        const up = parseFloat(card.querySelector('.crop-unit-price')?.value) || 0;
        const tr = parseInt(document.getElementById('totalRouteRuns').value) || 0;
        const gt = card.querySelector('.crop-grand-total');
        if (gt) gt.value = `$${(up * pl * tr).toFixed(2)}`;
      });
    }

    function updateStopNumbers() {
      document.querySelectorAll('#vendorContainer .vendor-card').forEach((c, i) => {
        c.querySelector('.stop-number').textContent = i + 1;
        const o = c.querySelector('[id^="vOrder-"]');
        if (o) o.value = i + 1;
      });
    }

    function updateVendorOrder() {
      const names = [];
      document.querySelectorAll('#vendorContainer .vendor-card').forEach((c, i) => {
        const idx = c.dataset.vendorIdx;
        const name = document.getElementById(`vName-${idx}`)?.value || `Vendor ${i + 1}`;
        names.push(`${i + 1}. ${name}`);
      });
      document.getElementById('vendorOrder').value = names.join('\n');
    }

    function initDragAndDrop() {
      document.querySelectorAll('#vendorContainer .vendor-card').forEach(card => {
        card.ondragstart = function(e) { draggedCard = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
        card.ondragend = function() { this.classList.remove('dragging'); draggedCard = null; updateStopNumbers(); updateVendorOrder(); };
        card.ondragover = function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
        card.ondrop = function(e) {
          e.preventDefault();
          if (draggedCard && draggedCard !== this) {
            const c = document.getElementById('vendorContainer'), a = [...c.querySelectorAll('.vendor-card')];
            a.indexOf(draggedCard) < a.indexOf(this) ? this.parentNode.insertBefore(draggedCard, this.nextSibling) : this.parentNode.insertBefore(draggedCard, this);
            updateStopNumbers(); updateVendorOrder();
          }
        };
      });
    }

    function submitForm(e) {
      e.preventDefault();
      if (!document.querySelectorAll('#vendorContainer .vendor-card').length) { alert('Please add at least one vendor.'); return; }
      if (!document.getElementById('routeName').value.trim()) { alert('Please enter a Route Name.'); return; }
      if (!document.getElementById('routeId').value) document.getElementById('routeId').value = 'RT-' + Date.now().toString(36).toUpperCase();
      document.querySelector('.submit-btn').style.display = 'none';
      const sm = document.getElementById('successMessage');
      sm.innerText = '✅ Route submitted successfully!\nPlease REFRESH the page before creating a new route.';
      sm.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
